import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
decorations = "None"
startup_mode = "Maximized"
opacity = 0.9

padding.x = 15
padding.y = 15

[scrolling]
history = 100000

[font]
normal.family = "JetBrainsMono Nerd Font"
size = 16.0

[bell]
animation = "Ease"
